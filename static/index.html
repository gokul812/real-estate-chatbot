<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate AI Assistant</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-deep:   #1a3c5e;
      --blue-mid:    #2457a0;
      --blue-light:  #3b82f6;
      --blue-pale:   #dbeafe;
      --accent:      #f59e0b;
      --bg:          #f0f4f8;
      --surface:     #ffffff;
      --border:      #d1dbe8;
      --text:        #1e293b;
      --text-muted:  #64748b;
      --bubble-user: #2457a0;
      --bubble-ai:   #ffffff;
      --radius:      14px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout ────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,0,0,.12);
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--blue-deep);
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: relative;
      z-index: 10;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: #fff; }

    .header-title h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .header-title p {
      font-size: .72rem;
      color: #94b8d6;
      font-weight: 400;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .72rem;
      color: #b0d0ea;
      letter-spacing: .02em;
    }

    /* ── Chat area ─────────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    /* Scrollbar */
    #chat-area::-webkit-scrollbar { width: 6px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty state / starters ────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      padding: 40px 16px;
      text-align: center;
    }

    .empty-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(26,60,94,.3);
    }

    .empty-icon svg { width: 38px; height: 38px; fill: #fff; }

    .empty-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--blue-deep);
    }

    .empty-sub {
      font-size: .9rem;
      color: var(--text-muted);
      max-width: 380px;
    }

    .starter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
    }

    .chip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 10px 18px;
      font-size: .85rem;
      cursor: pointer;
      color: var(--blue-deep);
      font-weight: 500;
      transition: background .15s, border-color .15s, box-shadow .15s, transform .1s;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      text-align: left;
    }

    .chip:hover {
      background: var(--blue-pale);
      border-color: var(--blue-light);
      box-shadow: 0 3px 10px rgba(36,87,160,.15);
      transform: translateY(-1px);
    }

    .chip:active { transform: translateY(0); }

    /* ── Message bubbles ───────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .75rem;
      font-weight: 700;
      color: #fff;
    }

    .avatar.ai-av { background: var(--blue-deep); }
    .avatar.user-av { background: var(--blue-mid); }
    .avatar svg { width: 18px; height: 18px; fill: #fff; }

    .bubble {
      max-width: min(72%, 640px);
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: .92rem;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 10px rgba(36,87,160,.25);
    }

    .bubble.ai {
      background: var(--bubble-ai);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }

    /* Markdown inside bubbles */
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }

    .bubble ul, .bubble ol {
      margin: 8px 0 8px 20px;
    }

    .bubble li { margin: 3px 0; }

    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble h3 {
      font-size: 1rem;
      margin: 10px 0 4px;
      color: var(--blue-deep);
    }

    .bubble.user h3 { color: #d4e8ff; }

    /* ── Tool call badge ───────────────────────────────────────── */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff8e6;
      border: 1.5px solid #f59e0b;
      color: #92400e;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .78rem;
      font-weight: 600;
      margin: 4px 0;
      letter-spacing: .01em;
    }

    .tool-badge .spinner-sm {
      width: 12px;
      height: 12px;
      border: 2px solid #f59e0b;
      border-top-color: #92400e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Loading spinner (first token) ────────────────────────── */
    .loading-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .typing-dots {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--blue-mid);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .6; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Divider / timestamp ───────────────────────────────────── */
    .timestamp {
      text-align: center;
      font-size: .7rem;
      color: var(--text-muted);
      margin: -6px 0;
      user-select: none;
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      background: var(--surface);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 18px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: .94rem;
      font-family: inherit;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--blue-mid);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--blue-deep); transform: scale(1.05); }
    #send-btn:active:not(:disabled) { transform: scale(.97); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; pointer-events: none; }

    .input-hint {
      font-size: .7rem;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 4px;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { height: 56px; padding: 0 14px; }
      .header-badge { display: none; }
      .header-title h1 { font-size: 1rem; }
      #chat-area { padding: 16px 10px 8px; }
      .bubble { max-width: 88%; font-size: .88rem; }
      #input-area { padding: 10px; }
      .empty-title { font-size: 1.15rem; }
      .chip { font-size: .8rem; padding: 8px 14px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>
    <div class="header-title">
      <h1>Real Estate AI Assistant</h1>
      <p>Powered by Claude AI</p>
    </div>
    <div class="header-badge">AI-Powered</div>
  </header>

  <!-- Chat messages -->
  <div id="chat-area">
    <!-- Empty state shown until first message -->
    <div id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <div class="empty-title">Your Real Estate Expert</div>
      <div class="empty-sub">Ask me anything about buying, selling, or renting in Mumbai, India or the US — properties, EMI/mortgages, neighborhoods, and market trends.</div>
      <div class="starter-chips">
        <button class="chip" onclick="sendStarter(this)">Find 2 BHK flats in Bandra Mumbai under 3 crore</button>
        <button class="chip" onclick="sendStarter(this)">Calculate EMI for a 1.5 crore flat in Powai with 20% down</button>
        <button class="chip" onclick="sendStarter(this)">Tell me about the Andheri neighborhood in Mumbai</button>
        <button class="chip" onclick="sendStarter(this)">What are Mumbai real estate market trends in 2024?</button>
        <button class="chip" onclick="sendStarter(this)">Find homes in Austin Texas under $500k</button>
        <button class="chip" onclick="sendStarter(this)">Compare buying vs renting in Mumbai</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-area">
    <div class="input-wrap">
      <textarea
        id="user-input"
        placeholder="Ask about properties, mortgages, neighborhoods..."
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

</div>

<script>
  // ── State ────────────────────────────────────────────────────
  let messages = [];        // conversation history sent to API
  let isStreaming = false;

  // ── DOM refs ─────────────────────────────────────────────────
  const chatArea   = document.getElementById('chat-area');
  const emptyState = document.getElementById('empty-state');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  // ── Auto-resize textarea ─────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  // ── Starter chip ─────────────────────────────────────────────
  function sendStarter(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  // ── Send message ─────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Hide empty state
    emptyState.style.display = 'none';

    // Append user bubble
    appendUserBubble(text);

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show loading
    const loadingEl = appendLoadingBubble();

    isStreaming = true;
    sendBtn.disabled = true;

    let aiBubble = null;     // the live AI bubble element
    let aiBubbleText = '';   // accumulated markdown text

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, user_message: text }),
      });

      if (!res.ok) {
        throw new Error(`Server error ${res.status}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // SSE messages are delimited by double newlines
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // keep incomplete tail

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data:')) continue;

          let payload;
          try { payload = JSON.parse(line.slice(5).trim()); }
          catch { continue; }

          if (payload.type === 'text') {
            // Remove loading dots on first text token
            if (loadingEl && loadingEl.parentNode) loadingEl.remove();

            if (!aiBubble) {
              aiBubble = createAiBubble();
              chatArea.appendChild(aiBubble);
            }
            aiBubbleText += payload.content;
            aiBubble.querySelector('.bubble').innerHTML = renderMarkdown(aiBubbleText);
            scrollBottom();

          } else if (payload.type === 'tool_call') {
            // Remove loading dots if still present
            if (loadingEl && loadingEl.parentNode) loadingEl.remove();

            // Show tool badge inside current AI bubble (or create one)
            if (!aiBubble) {
              aiBubble = createAiBubble();
              chatArea.appendChild(aiBubble);
            }
            const badge = document.createElement('div');
            badge.className = 'tool-badge';
            badge.innerHTML = `<div class="spinner-sm"></div>${toolLabel(payload.name)}`;
            aiBubble.querySelector('.bubble').appendChild(badge);
            scrollBottom();

          } else if (payload.type === 'done') {
            // Stop the spinner on any remaining tool badges
            aiBubble && aiBubble.querySelectorAll('.spinner-sm').forEach(s => {
              s.style.animation = 'none';
              s.style.borderTopColor = '#16a34a';
              s.style.borderColor = '#16a34a';
            });

            // Save assistant message to history (plain text, stripped of badges)
            messages.push({ role: 'user',      content: text });
            messages.push({ role: 'assistant', content: aiBubbleText });

          } else if (payload.type === 'error') {
            if (loadingEl && loadingEl.parentNode) loadingEl.remove();
            if (!aiBubble) {
              aiBubble = createAiBubble();
              chatArea.appendChild(aiBubble);
            }
            aiBubble.querySelector('.bubble').innerHTML =
              `<span style="color:#dc2626">Sorry, an error occurred: ${escapeHtml(payload.message)}</span>`;
            scrollBottom();
          }
        }
      }

    } catch (err) {
      if (loadingEl && loadingEl.parentNode) loadingEl.remove();
      if (!aiBubble) {
        aiBubble = createAiBubble();
        chatArea.appendChild(aiBubble);
      }
      aiBubble.querySelector('.bubble').innerHTML =
        `<span style="color:#dc2626">Connection error: ${escapeHtml(err.message)}</span>`;
      scrollBottom();
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── DOM helpers ──────────────────────────────────────────────

  function appendUserBubble(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="bubble user">${renderMarkdown(escapeHtml(text))}</div>
      <div class="avatar user-av">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
  }

  function appendLoadingBubble() {
    const row = document.createElement('div');
    row.className = 'loading-row';
    row.innerHTML = `
      <div class="avatar ai-av">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
    return row;
  }

  function createAiBubble() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="avatar ai-av">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <div class="bubble ai"></div>`;
    return row;
  }

  function toolLabel(name) {
    const labels = {
      search_properties:    'Searching properties...',
      calculate_mortgage:   'Calculating mortgage...',
      get_neighborhood_info:'Analyzing neighborhood...',
      get_market_trends:    'Fetching market trends...',
    };
    return labels[name] || `Running ${name}...`;
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Markdown renderer (lightweight) ─────────────────────────
  function renderMarkdown(text) {
    // We work on already-escaped HTML for user bubbles, raw for AI bubbles.
    // For AI bubbles we escape first then render markdown.
    let s = text;

    // Escape HTML (only if not already escaped — we detect by checking for &)
    // Simple rule: if it looks like raw text (no existing tags), escape it.
    // For AI bubble we receive raw Claude output, so escape then markdown.
    s = escapeHtml(s);

    // Headings
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h3>$1</h3>');

    // Bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Bullet lists (lines starting with - or *)
    s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    s = s.replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);

    // Numbered lists
    s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    // Paragraphs (double newline)
    const blocks = s.split(/\n{2,}/);
    s = blocks.map(b => {
      b = b.replace(/\n/g, '<br>');
      if (b.startsWith('<h3>') || b.startsWith('<ul>') || b.startsWith('<ol>') || b.startsWith('<li>')) return b;
      return `<p>${b}</p>`;
    }).join('\n');

    return s;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Focus input on load ──────────────────────────────────────
  inputEl.focus();
</script>
</body>
</html>
